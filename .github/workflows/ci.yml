name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt
        run: bash bash/tf_wrapper.sh fmt sample_data/terraform
      - name: Terraform validate
        run: bash bash/tf_wrapper.sh validate sample_data/terraform

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        run: shellcheck bash/*.sh

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Python tests
        run: python -m pytest tests/ -v

  ansible:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check playbook.yml
        run: ansible-playbook -i ansible/inventory.ini --syntax-check ansible/playbook.yml
      - name: Syntax check webserver.yml
        run: ansible-playbook -i ansible/inventory.ini --syntax-check ansible/webserver.yml

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: bash bash/docker_helper.sh build sample_data/docker
      - name: Run Docker container
        run: bash bash/docker_helper.sh run
      - name: Test health endpoint
        run: curl -f http://localhost:8080/health
      - name: Test ready endpoint 
        run: curl -f http://localhost:8080/ready
      - name: Cleanup
        run: bash bash/docker_helper.sh clean

